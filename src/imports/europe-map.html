<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Europe Work Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  body {
    margin: 0;
    background: #0f172a; /* SEA COLOR */
    font-family: Arial, sans-serif;
  }

  #map {
    height: 80vh;
    width: 50%;
    background: #0f172a; /* SEA COLOR */
  }

  /* Remove default attribution visually */
  .leaflet-control-attribution {
    display: none !important;
  }

  /* Custom popup style */
  .leaflet-popup-content-wrapper {
    background: #1e293b;
    color: #ffffff;
    border-radius: 12px;
  }

  .leaflet-popup-tip {
    background: #1e293b;
  }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Initialize map
  var map = L.map('map', {
    center: [54, 15],
    zoom: 4,
    zoomControl: true,
    attributionControl: false,
    scrollWheelZoom: true,
    dragging: true,
    maxBounds: [
      [34, -25],
      [72, 45]
    ]
  });

  // Style countries
  function countryStyle(feature) {
    return {
      fillColor: "#1e293b",   // COUNTRY COLOR
      weight: 1,
      opacity: 1,
      color: "#334155",      // BORDER COLOR
      fillOpacity: 1
    };
  }

  // Load Europe GeoJSON
  fetch("europe.geojson")
    .then(response => response.json())
    .then(data => {
      L.geoJSON(data, {
        style: countryStyle
      }).addTo(map);
    });

  // Example project markers
  function addProject(lat, lng, title, description) {
    L.circleMarker([lat, lng], {
      radius: 8,
      fillColor: "#f59e0b",
      color: "#ffffff",
      weight: 2,
      fillOpacity: 1
    })
    .addTo(map)
    .bindPopup("<strong>" + title + "</strong><br>" + description);
  }

  // Sample projects
  addProject(55.85, -4.2531, "Glasgow Project", "Urban Strategy 2023");
  addProject(59.903, 17.353, "Uppsala Project", "Cultural Study 2022");
  addProject(57.2655, 16.4485, "oskarshamn Project", "Heritage Research 2021");
  addProject(61.6333, 17.0667, "Iggesund Project", "Heritage Research 2021");
  addProject(59.6333, 18.0000, "Brista Project", "Heritage Research 2021");
  addProject(58.5, 13.167, "Lidköping Project", "Heritage Research 2021");
  addProject(48.20854, 12.39893, "Waldkraiburg Project", "Heritage Research 2021");
  addProject(64.13333, 25.36667, "Haapavesi Project", "Heritage Research 2021");
  addProject(64.48699, 24.98868, "Vihanti Project", "Heritage Research 2021");
  addProject(65.96456, 29.18833, "Kuusamo Project", "Heritage Research 2021");
  addProject(60.90693, 26.62419, "Kuusankoski Project", "Heritage Research 2021");
  addProject(62.24167, 25.74958, "Jyväskylä Project", "Heritage Research 2021");
  addProject(61.23406, 21.49075, "Olkiluoto Project", "Heritage Research 2021");
  addProject(64.68453, 24.48163, "Raahe Project", "Heritage Research 2021");
  addProject(66.50255, 25.73039, "Rovaniemi Project", "Heritage Research 2021");
  addProject(60.29299, 25.04367, "Vantaa Project", "Heritage Research 2021");
  addProject(62.60064, 29.76198, "Joensuu Project", "Heritage Research 2021");
  addProject(62.60322, 25.73014, "Äänekoski Project", "Heritage Research 2021");
  addProject(62.21005, 27.68890, "Huutokoski Project", "Heritage Research 2021");
  addProject(64.13183, 28.38783, "Sotkamo Project", "Heritage Research 2021");
  addProject(60.16662, 24.94354, "Helsinki Project", "Heritage Research 2021");
  addProject(65.73334, 24.56665, "Kemi Project", "Heritage Research 2021");
  addProject(60.46727, 26.94595, "Kotka Project", "Heritage Research 2021");
  addProject(63.07442, 27.65894, "Siilinjärvi Project", "Heritage Research 2021");
</script>

</body>
</html>
